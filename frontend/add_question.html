<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Question</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="checkRole('Faculty')">
    <script src="auth_check.js"></script>
    <script src="utils.js"></script>
    <script src="logout_redirect.js"></script>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="faculty_dashboard.html">Faculty Tools</a>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 900px;">
        <h2 class="mb-4">Add New Question to Bank</h2>
        
        <form id="questionForm">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="courseSelect" class="form-label">Course:</label>
                    <select id="courseSelect" class="form-select" required onchange="loadCLOs('courseSelect', 'cloSelect')">
                        </select>
                </div>
                <div class="col-md-4">
                    <label for="cloSelect" class="form-label">CLO:</label>
                    <select id="cloSelect" class="form-select" required>
                        <option value="">Select CLO</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="qType" class="form-label">Question Type:</label>
                    <select id="qType" class="form-select" required onchange="toggleOptionFields()">
                        <option value="">Select Type</option>
                        <option value="MCQ">MCQ</option>
                        <option value="Theory">Theory</option>
                        <option value="Numerical">Numerical</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                    <div class="col-md-4">
                    <label for="difficulty" class="form-label">Difficulty:</label>
                    <select id="difficulty" class="form-select" required>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="marks" class="form-label">Marks (Max 99.99):</label>
                    <input type="number" id="marks" class="form-control" step="0.01" min="1" max="99.99" value="5.00" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="questionText" class="form-label">Question Text:</label>
                <textarea id="questionText" class="form-control" rows="3" required></textarea>
            </div>

            <div id="optionsContainer" style="display:none;" class="mb-4 p-3 border rounded bg-light">
                <h5>MCQ Options (Select ONE correct answer)</h5>
                <div id="mcqOptions">
                    </div>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addOptionField()">+ Add Option</button>
            </div>
            
            <button type="submit" class="btn btn-success">Submit Question</button>
            <p id="message" class="mt-3"></p>
        </form>
    </div>

    <script>
        // optionCount is only used locally in addOptionField for unique names
        let optionCount = 0; 
        
        document.addEventListener('DOMContentLoaded', () => {
            // Load courses on page load
            if(typeof loadCourses === 'function') loadCourses('courseSelect');
            
            // *** FIX: Removed the immediate creation of 4 options to eliminate the console error on page load. ***
            document.getElementById('mcqOptions').innerHTML = '';
        });

        /**
         * Toggles the visibility of the MCQ options container.
         * Creates default options only the first time MCQ is selected.
         */
        function toggleOptionFields() {
            const qType = document.getElementById('qType').value;
            const container = document.getElementById('optionsContainer');
            container.style.display = qType === 'MCQ' ? 'block' : 'none';

            // Check if options need to be initialized (i.e., when switching to MCQ and the container is empty)
            const currentOptionCount = document.querySelectorAll('#mcqOptions .input-group').length;

            if (qType === 'MCQ' && currentOptionCount === 0) {
                 // Initialize default 4 options
                 optionCount = 0;
                 for (let i = 1; i <= 4; i++) {
                    addOptionField(true);
                }
            }
        }

        /**
         * Dynamically adds an MCQ option field.
         * Includes the necessary 'name' attribute for form validation (The fix).
         */
        function addOptionField(isInitialLoad) {
            // Determine the next sequential index for the new option
            const currentOptions = document.querySelectorAll('#mcqOptions .input-group');
            const newOptionIndex = currentOptions.length + 1;
            
            const container = document.getElementById('mcqOptions');
            const div = document.createElement('div');
            div.className = 'input-group mb-2';
            
            div.innerHTML = `
                <div class="input-group-text">
                    <input class="form-check-input mt-0" type="radio" 
                           name="is_correct" 
                           value="${newOptionIndex}" 
                           aria-label="Radio button for correct option" 
                           required>
                </div>
                <input type="text" class="form-control mcq-option-text" 
                       name="option_text_${newOptionIndex}" 
                       data-option-index="${newOptionIndex}" 
                       placeholder="Option ${newOptionIndex} Text" 
                       required>
            `;
            container.appendChild(div);

            // Set focus on the newly added field if it wasn't one of the initial four
            if (!isInitialLoad) {
                div.querySelector('.mcq-option-text').focus();
            }
        }

        document.getElementById('questionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const qType = document.getElementById('qType').value;
            const msg = document.getElementById('message');
            const submitBtn = e.submitter;

            // Start loading state
            submitBtn.disabled = true;
            msg.textContent = 'Submitting...';
            msg.className = 'mt-3 text-info';

            const cloSelect = document.getElementById('cloSelect');
            const courseSelect = document.getElementById('courseSelect');

            // Validate essential fields
            if (!courseSelect.value || !cloSelect.value) {
                msg.textContent = 'Please select a valid Course and CLO.';
                msg.className = 'mt-3 text-danger';
                submitBtn.disabled = false;
                return;
            }

            const questionData = {
                question_text: document.getElementById('questionText').value,
                q_type: qType,
                difficulty: document.getElementById('difficulty').value,
                marks: parseFloat(document.getElementById('marks').value), 
                // Ensure CLO is sent as integer
                clo_id: parseInt(document.getElementById('cloSelect').value), 
            };
            
            // Handle MCQ options
            if (qType === 'MCQ') {
                const optionInputs = document.querySelectorAll('.mcq-option-text');
                const isCorrectRadio = document.querySelector('input[name="is_correct"]:checked');
                
                if (!isCorrectRadio) {
                    msg.textContent = 'Please select one correct answer for the MCQ.';
                    msg.className = 'mt-3 text-danger';
                    submitBtn.disabled = false;
                    return;
                }
                
                const correctValue = parseInt(isCorrectRadio.value); // The index of the correct option
                const options = [];
                let validOptionCount = 0;
                
                optionInputs.forEach(input => {
                    // Get the index from the data attribute
                    const optionIndex = parseInt(input.getAttribute('data-option-index'));

                    if (input.value.trim() === '') return; // Skip empty options

                    options.push({
                        text: input.value,
                        // Check if this option's index matches the selected radio button's value
                        is_correct: (optionIndex === correctValue) 
                    });
                    validOptionCount++;
                });
                
                if (validOptionCount < 2) {
                    msg.textContent = 'MCQ requires at least two non-empty options.';
                    msg.className = 'mt-3 text-danger';
                    submitBtn.disabled = false;
                    return;
                }
                
                questionData.options = options;
            }

            try {
                // API_BASE_URL is assumed to be available from utils.js
                const response = await fetch(`${API_BASE_URL}/questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(questionData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    msg.textContent = `Success! Question ID ${result.question_id} added.`;
                    msg.className = 'mt-3 text-success';
                    
                    // Reset form fields
                    document.getElementById('questionText').value = '';
                    document.getElementById('marks').value = '5.00';
                    document.getElementById('qType').value = ''; 
                    
                    // Clear and re-hide options, but don't automatically re-add defaults until MCQ is selected again
                    document.getElementById('mcqOptions').innerHTML = ''; 
                    toggleOptionFields(); 

                } else {
                    // Display detailed error from backend
                    const errorMessage = result.details ? JSON.stringify(result.details) : (result.error || 'Unknown error');
                    msg.textContent = `Error: ${errorMessage}`;
                    msg.className = 'mt-3 text-danger';
                    console.error('API Error:', result);
                }
            } catch (error) {
                msg.textContent = 'Network Error: Could not connect to API.';
                msg.className = 'mt-3 text-danger';
                console.error('Fetch error:', error);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
