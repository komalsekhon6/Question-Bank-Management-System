<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage PYQ Papers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="checkRole('Faculty')">
    <script src="auth_check.js"></script>
    <script src="utils.js"></script>
    <script src="logout_redirect.js"></script>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="faculty_dashboard.html">Faculty Tools</a>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 800px;">
        <h2 class="mb-4">Upload and Tag Previous Year Paper Metadata</h2>
        
        <div class="card shadow-sm p-4">
            <form id="pyqPaperForm">
                
                <div class="mb-3">
                    <label for="paperFile" class="form-label">Upload Exam Paper (PDF/DOCX):</label>
                    <input class="form-control" type="file" id="paperFile" required>
                    <div class="form-text">Note: File is currently not uploaded to a server, but its name will be used.</div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="courseSelect" class="form-label">Course:</label>
                        <select id="courseSelect" class="form-select" required>
                            </select>
                    </div>
                    <div class="col-md-4">
                        <label for="year" class="form-label">Year:</label>
                        <input type="number" id="year" class="form-control" min="2000" max="2099" value="2024" required>
                    </div>
                    <div class="col-md-4">
                        <label for="semester" class="form-label">Semester:</label>
                        <select id="semester" class="form-select" required>
                            <option value="1">1 (Odd)</option>
                            <option value="2">2 (Even)</option>
                            <option value="3">3 (Summer)</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="examType" class="form-label">Exam Type:</label>
                        <select id="examType" class="form-select" required>
                            <option value="Midterm">Midterm</option>
                            <option value="Final">Final</option>
                            <option value="Quiz">Quiz</option>
                            <option value="Assignment">Assignment</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="setBy" class="form-label">Set By (Faculty Username):</label>
                        <input type="text" id="setBy" class="form-control" readonly required>
                        <div class="form-text">This is your logged-in username, used to link the paper to FacultyID.</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-3">Save Paper Metadata</button>
            </form>
            <p id="message" class="mt-3"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Check auth and load courses on page load
            if(checkRole('Faculty')) {
                loadCourses('courseSelect');
                // Auto-fill the 'Set By' field with the logged-in username
                const username = localStorage.getItem('userRole');
                if (username) {
                    document.getElementById('setBy').value = localStorage.getItem('userRole'); 
                }
            }
        });

        document.getElementById('pyqPaperForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const msg = document.getElementById('message');

            // NOTE: The actual file upload and storage logic would go here.
            // For now, we just take the filename.
            const fileInput = document.getElementById('paperFile');
            const fileName = fileInput.files[0] ? fileInput.files[0].name : 'N/A';
            
            const paperData = {
                CourseID: document.getElementById('courseSelect').value,
                Year: parseInt(document.getElementById('year').value),
                Semester: parseInt(document.getElementById('semester').value),
                ExamType: document.getElementById('examType').value,
                FacultyUsername: document.getElementById('setBy').value, 
                FileName: fileName // Placeholder name for display/storage link
            };

            try {
                const response = await fetch(`${API_BASE_URL}/pyq_papers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paperData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    msg.textContent = `Success! Paper metadata for ${fileName} saved with ID ${result.paper_id}.`;
                    msg.className = 'mt-3 text-success';
                    // Reset form but keep 'Set By'
                    form.reset();
                    document.getElementById('setBy').value = paperData.FacultyUsername; 
                } else {
                    msg.textContent = `Error: ${result.details || result.error || 'Failed to save paper metadata.'}`;
                    msg.className = 'mt-3 text-danger';
                }
            } catch (error) {
                msg.textContent = 'Network Error: Could not connect to API.';
                msg.className = 'mt-3 text-danger';
                console.error('Save Paper error:', error);
            }
        });
    </script>
</body>
</html>
