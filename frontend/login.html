<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - QBMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 400px;">
        <h2 class="mb-4 text-center">Question Bank Login</h2>
        <form id="loginForm" class="p-4 border rounded shadow-sm">
            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
            <p id="message" class="mt-3 text-center"></p>
        </form>
    </div>

    <script src="utils.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                
                if (response.ok) {
                    message.textContent = `Welcome, ${result.username}!`;
                    message.className = 'mt-3 text-success';
                    
                    // Store the role for use by auth_check
                    localStorage.setItem('userRole', result.role);
                    
                    if (result.role === 'Faculty') {
                        setTimeout(() => { window.location.href = 'faculty_dashboard.html'; }, 500);
                    } else if (result.role === 'Student') {
                        setTimeout(() => { window.location.href = 'student_view.html'; }, 500);
                    }
                } else {
                    message.textContent = result.error || 'Login failed. Invalid credentials.';
                    message.className = 'mt-3 text-danger';
                }

            } catch (error) {
                message.textContent = 'Network error. Check server status.';
                message.className = 'mt-3 text-danger';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
