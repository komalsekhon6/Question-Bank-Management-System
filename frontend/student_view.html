<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="checkRole('Student')">
    <script src="auth_check.js"></script>
    <script src="utils.js"></script>
    <script src="logout_redirect.js"></script>

    <nav class="navbar navbar-light bg-info">
        <div class="container">
            <span class="navbar-brand text-white">Student Dashboard</span>
            <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Welcome to the Question Bank</h2>

        <div class="row g-4 justify-content-center">
            
            <div class="col-md-5">
                <div class="card shadow-sm text-center p-4">
                    <h5 class="card-title">View Questions</h5>
                    <p class="card-text">Search and filter questions from the question bank by Course, CLO, and Difficulty.</p>
                    <a href="question_search.html" class="btn btn-primary mt-2">Go to Question Search</a>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm text-center p-4">
                    <h5 class="card-title">View PYQ Papers</h5>
                    <p class="card-text">Access previous year question papers for revision and practice.</p>
                    <a href="pyq_viewer.html" class="btn btn-info mt-2">View PYQ Papers</a>
                </div>
            </div>
            
        </div>

    </div>
</body>
</html>
