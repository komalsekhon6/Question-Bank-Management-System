<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Course Learning Outcomes (CLOs)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .clo-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            border-left: 5px solid #ffc107;
            background-color: #fff3cd;
            border-radius: 4px;
        }
    </style>
</head>
<body onload="checkRole('Faculty')">
    <script src="auth_check.js"></script>
    <script src="utils.js"></script>
    <script src="logout_redirect.js"></script>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="faculty_dashboard.html">Faculty Tools</a>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Manage Course Learning Outcomes (CLOs)</h2>
        
        <!-- Course Selection -->
        <div class="card shadow-sm p-4 mb-4">
            <h5 class="card-title">Select Course</h5>
            <label for="courseSelect" class="form-label">Course:</label>
            <select id="courseSelect" class="form-select" onchange="fetchCLOs()"></select>
            <p id="courseMessage" class="mt-2 text-muted"></p>
        </div>

        <div class="row">
            <!-- CLO Display Section -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="card-title">Existing CLOs</h5>
                    <div id="closList" class="mt-3">
                        <p class="text-info">Select a course to view its CLOs.</p>
                    </div>
                </div>
            </div>

            <!-- Add New CLO Form -->
            <div class="col-md-6">
                <div class="card shadow-sm p-4 h-100">
                    <h5 class="card-title">Add New CLO</h5>
                    <form id="addCloForm" class="mt-3">
                        <div class="mb-3">
                            <label for="cloID" class="form-label">CLO Identifier (e.g., 1, 2, 3):</label>
                            <input type="number" id="cloID" class="form-control" required min="1">
                        </div>
                        <div class="mb-3">
                            <label for="cloText" class="form-label">CLO Description:</label>
                            <textarea id="cloText" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Add CLO</button>
                        <p id="cloMessage" class="mt-3 text-center"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Course Dropdown on load
        window.onload = function() {
            checkRole('Faculty');
            loadCourses('courseSelect');
        };

        // --- Function to fetch and display CLOs ---
        async function fetchCLOs() {
            const courseID = document.getElementById('courseSelect').value;
            const closList = document.getElementById('closList');
            closList.innerHTML = '<p class="text-info">Loading CLOs...</p>';

            if (!courseID) {
                closList.innerHTML = '<p class="text-info">Select a course to view its CLOs.</p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/clos/${courseID}`);
                if (!response.ok) { throw new Error('Failed to fetch CLOs.'); }
                
                const clos = await response.json();
                
                if (clos.length === 0) {
                    closList.innerHTML = '<p class="text-warning">No CLOs defined for this course yet.</p>';
                    return;
                }

                closList.innerHTML = ''; // Clear loading message

                clos.forEach(clo => {
                    const item = document.createElement('div');
                    item.className = 'clo-item shadow-sm';
                    item.innerHTML = `<strong>CLO-${clo.CLOID}:</strong> ${clo.CLOText}`;
                    closList.appendChild(item);
                });

            } catch (error) {
                closList.innerHTML = `<p class="text-danger">Error loading CLOs: ${error.message}</p>`;
                console.error('Fetch CLOs error:', error);
            }
        }

        // --- Form Submission Handler for adding a new CLO ---
        document.getElementById('addCloForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const courseID = document.getElementById('courseSelect').value;
            const cloID = document.getElementById('cloID').value;
            const cloText = document.getElementById('cloText').value;
            const msg = document.getElementById('cloMessage');

            if (!courseID) {
                msg.textContent = 'Please select a Course first.';
                msg.className = 'mt-3 text-danger';
                return;
            }

            msg.textContent = 'Adding CLO...';
            msg.className = 'mt-3 text-muted';
            
            const cloData = {
                CourseID: courseID,
                CLOID: parseInt(cloID),
                CLOText: cloText
            };

            try {
                const response = await fetch(`${API_BASE_URL}/clos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cloData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    msg.textContent = `Success! CLO-${cloID} added.`;
                    msg.className = 'mt-3 text-success';
                    document.getElementById('addCloForm').reset();
                    fetchCLOs(); // Refresh the list
                } else {
                    msg.textContent = `Error: ${result.error || 'Failed to add CLO.'}`;
                    msg.className = 'mt-3 text-danger';
                }
            } catch (error) {
                msg.textContent = 'Network Error: Could not connect to API.';
                msg.className = 'mt-3 text-danger';
                console.error('Add CLO error:', error);
            }
        });
    </script>
</body>
</html>
